name: Deploy to Homeserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Start or Restart Application
        run: |
          npm install -g pm2
          # Check if the app is already running in pm2
          if pm2 describe factline-dashboard > /dev/null; then
            pm2 restart factline-dashboard
          else
            pm2 start npm --name "factline-dashboard" -- run start
          fi
          pm2 save
