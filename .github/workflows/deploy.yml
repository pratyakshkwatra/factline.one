name: Deploy to Homeserver (Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t factline-dashboard .

      - name: Stop Old Container
        run: docker rm -f factline-dashboard || true

      - name: Run New Container
        run: docker run -d --name factline-dashboard -p 3000:3000 --restart unless-stopped factline-dashboard
