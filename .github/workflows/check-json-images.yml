name: Check JSON Images

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'public/data/**/*.json'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'public/data/**/*.json'

jobs:
  check-images:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        
    - name: Check JSON for missing images
      run: node scripts/check-images.js
